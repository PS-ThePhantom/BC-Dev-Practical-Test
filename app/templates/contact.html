{% extends "client_contact_base.html" %}

{% block inputs %}
                    <div class="mb-3 text-start">
                        <label for="{{ mainTab }}-name" class="form-label">{{ mainTab|capitalize }} Name</label>
                        <input type="text" class="form-control" id="{{ mainTab }}-name" placeholder="Enter {{ mainTab }} name" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label for="{{ mainTab }}-surname" class="form-label">{{ mainTab|capitalize }} surname</label>
                        <input type="text" class="form-control" id="{{ mainTab }}-surname" placeholder="Enter {{ mainTab }} surname" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label for="{{ mainTab }}-email" class="form-label">{{ mainTab|capitalize }} email</label>
                        <input type="text" class="form-control" id="{{ mainTab }}-email" placeholder="Enter {{ mainTab }} email" required>
                    </div>
{% endblock %}
